version: '3.8'
services:
  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_PATH=/app/data/tasks.db
    volumes:
      - taskflow-data:/app/data
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/tasks"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - taskflow-net
 
volumes:
  taskflow-data:
    driver: local
 
networks:
  taskflow-net:
    driver: bridge
