version: '3.8'
services:
  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_PATH=/app/data/tasks.db
      - SUPERADMIN_EMAIL=aulavirtual@sycchile.com
      - JWT_SECRET=syc-chile-prod-secret-2025
    volumes:
      - taskflow-data:/app/data
    networks:
      - taskflow-net

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - taskflow-net

volumes:
  taskflow-data:
    driver: local

networks:
  taskflow-net:
    driver: bridge
